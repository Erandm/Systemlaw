    <style>
        :root {--primary:#f2cb05;--primary-hover:#d1b004;--danger:#ff4d4d;--success:#2ecc71;--info:#3498db;--bg-color:#121212;--card-bg:#1e1e1e;--text-main:#ffffff;--text-muted:#a0a0a0;--border:#333333; --secondary-blue: #3b82f6; --call-green: #10b981; --wa-green: #25D366;}
        *{box-sizing:border-box;font-family:'Heebo',sans-serif;}
        body{background-color:var(--bg-color);color:var(--text-main);margin:0;padding:0;display:flex;justify-content:center;min-height:100vh;}
        .app-container{width:100%;max-width:500px;padding:20px;display:flex;flex-direction:column;position:relative;padding-bottom:140px;}
        .header{text-align:center;margin-bottom:15px;}
        .logo-container img{max-width:90%;height:auto;opacity:0.9;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.3));}
        
        .install-btn {display:none; background-color:var(--success); color:#fff; border:none; padding:10px 20px; border-radius:50px; font-weight:bold; cursor:pointer; margin: 0 auto 20px auto; align-items:center; gap:8px;}
        .ios-prompt {display:none; background:#2a2a2a; border:1px solid var(--primary); padding:15px; border-radius:8px; text-align:center; margin-bottom:20px; font-size:14px;}

        .tabs{display:flex;justify-content:center;gap:5px;margin-bottom:25px;}
        .tab-btn{flex:1;padding:12px 2px;font-size:13px;font-weight:bold;background:#2a2a2a;color:#fff;border:1px solid #444;border-radius:8px;cursor:pointer;white-space:nowrap;transition:0.3s;}
        .tab-btn.active{background:var(--primary);color:#000;border-color:var(--primary);}
        
        .tab-content{display:none; animation:fadeIn 0.4s ease-out;}
        .tab-content.active{display:block;}
        @keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

        .search-input-group{display:flex;background:#2a2a2a;border-radius:8px;border:1px solid #444;margin-bottom:15px;position:relative;overflow:hidden;}
        input{flex-grow:1;padding:16px;font-size:16px;border:none;background:transparent;color:#fff;outline:none;}
        .search-btn{background-color:var(--primary);color:#000;border:none;padding:0 20px;font-weight:bold;cursor:pointer;}

        /* מחשבון אזהרה */
        .check-container {display: flex; align-items: center; justify-content: space-between; padding: 12px; background: #262626; border-radius: 8px; margin-bottom: 8px; cursor: pointer; border: 1px solid #333;}
        .check-container input {flex-grow: 0; width: 22px; height: 22px; accent-color: var(--primary); cursor: pointer;}
        .section-title {color: var(--primary); font-weight: bold; margin: 15px 0 10px 0; border-bottom: 1px dotted #555; padding-bottom: 5px; font-size: 14px;}

        .offense-card{background:var(--card-bg);border-radius:8px;padding:20px;border-right:4px solid var(--primary);border:1px solid var(--border); margin-bottom:15px;}
        .badge{font-size:12px;font-weight:bold;padding:4px 8px;border-radius:4px;background:#2a2a2a;color:var(--text-muted);margin-left:5px;}
        .badge.court.blink{animation:blinker 1.2s infinite alternate; background:#e74c3c; color:#fff;}
        @keyframes blinker {from {opacity: 1;} to {opacity: 0.5;}}

        .expert-card { border-right: 4px solid var(--secondary-blue); display: flex; flex-direction: column; }
        .contact-name { font-weight: 800; font-size: 1.1rem; color: var(--primary); margin-bottom:5px;}
        .actions { display: flex; gap: 8px; margin-top:12px; }
        .action-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 10px; border-radius: 50px; color: white; text-decoration: none; font-weight: 700; font-size: 0.9rem; box-shadow: 0 4px 6px rgba(0,0,0,0.2);}
        .btn-call { background: var(--call-green); }
        .btn-wa { background: var(--wa-green); }
        .btn-email { background: var(--info); }

        .footer-note{position:absolute;bottom:15px;left:15px;right:15px;text-align:center;background:#1a1a1a;padding:15px;border-radius:8px;font-size:11px;color:#fff; border-top:1px solid var(--primary);}
    </style>

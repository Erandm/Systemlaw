<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <title>מערכת עזר משפטית | עו"ד ערן דמרי</title>
    <meta name="description" content="מערכת עזר מקצועית לעורכי דין תעבורה: חיפוש חנ''א מרץ 2026, בדיקת תו נכה, מאגר מומחים ומחשבון המרה לאזהרה.">
    <meta name="keywords" content="עורך דין תעבורה, ערן דמרי, חנא, סמל סעיף, תו נכה, המרה לאזהרה, דוח תנועה, נקודות">
    <meta name="author" content="עו''ד ערן דמרי">
    
    <meta name="google-site-verification" content="b95FeajTUe8qQAx7oqYCWQlgBDopgw_KA48q6j96CkE" />
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="manifest" href="manifest.json">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#f2cb05">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="עו''ד ערן דמרי">
    <link rel="apple-touch-icon" href="logo.png">

    <meta property="og:title" content="מערכת עורכי דין - ערן דמרי">
    <meta property="og:description" content="מערכת עזר משפטית לחיפוש עבירות תעבורה, בדיקת תו נכה ומחשבון אזהרה.">
    <meta property="og:image" content="logo.png">
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-1V4RFTK8HJ"></script>
    <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-1V4RFTK8HJ');</script>

    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {--primary:#f2cb05;--primary-hover:#d1b004;--danger:#ff4d4d;--success:#2ecc71;--info:#3498db;--bg-color:#121212;--card-bg:#1e1e1e;--text-main:#ffffff;--text-muted:#a0a0a0;--border:#333333; --secondary-blue: #3b82f6; --call-green: #10b981; --wa-green: #25D366;}
        *{box-sizing:border-box;font-family:'Heebo',sans-serif;}
        body{background-color:var(--bg-color);color:var(--text-main);margin:0;padding:0;display:flex;justify-content:center;min-height:100vh;}
        .app-container{width:100%;max-width:500px;padding:20px;display:flex;flex-direction:column;position:relative;padding-bottom:140px;}
        .header{text-align:center;margin-bottom:15px;}
        .logo-container img{max-width:90%;height:auto;opacity:0.9;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.3));}
        
        .install-btn {display:none; background-color:var(--success); color:#fff; border:none; padding:10px 20px; border-radius:50px; font-weight:bold; cursor:pointer; margin: 0 auto 20px auto;}
        .ios-prompt {display:none; background:#2a2a2a; border:1px solid var(--primary); padding:15px; border-radius:8px; text-align:center; margin-bottom:20px;}

        .tabs{display:flex;justify-content:center;gap:5px;margin-bottom:25px;}
        .tab-btn{flex:1;padding:12px 2px;font-size:13px;font-weight:bold;background:#2a2a2a;color:#fff;border:1px solid #444;border-radius:8px;cursor:pointer;white-space:nowrap;}
        .tab-btn.active{background:var(--primary);color:#000;}
        
        .tab-content{display:none;}
        .tab-content.active{display:block;}

        .search-input-group{display:flex;background:#2a2a2a;border-radius:8px;border:1px solid #444;margin-bottom:15px;position:relative;}
        input{flex-grow:1;padding:16px;font-size:16px;border:none;background:transparent;color:#fff;outline:none;}
        .search-btn{background-color:var(--primary);color:#000;border:none;padding:0 20px;font-weight:bold;cursor:pointer;border-radius:8px 0 0 8px;}

        /* מחשבון אזהרה */
        .check-container {display: flex; align-items: center; justify-content: space-between; padding: 12px; background: #333; border-radius: 8px; margin-bottom: 8px; cursor: pointer;}
        .check-container input {flex-grow: 0; width: 20px; height: 20px; accent-color: var(--primary);}

        .results-container{margin-top:20px; display: flex; flex-direction: column; gap: 15px;}
        .offense-card{background:var(--card-bg);border-radius:8px;padding:20px;border-right:4px solid var(--primary);border:1px solid var(--border);}
        .badge{font-size:12px;font-weight:bold;padding:4px 8px;border-radius:4px;background:#2a2a2a;color:var(--text-muted);margin-left:5px;}
        .badge.court.blink{animation:blinker 1.2s infinite alternate; background:#e74c3c; color:#fff;}
        @keyframes blinker {from {opacity: 1;} to {opacity: 0.5;}}

        .expert-card { border-right: 4px solid var(--secondary-blue); display: none; flex-direction: column; }
        .contact-name { font-weight: 800; font-size: 1.1rem; color: var(--primary); }
        .actions { display: flex; gap: 8px; margin-top:10px; }
        .action-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 5px; padding: 10px; border-radius: 50px; color: white; text-decoration: none; font-weight: 700; font-size: 0.9rem; }
        .btn-call { background: var(--call-green); }
        .btn-wa { background: var(--wa-green); }

        .footer-note{position:absolute;bottom:15px;left:15px;right:15px;text-align:center;background:#1a1a1a;padding:15px;border-radius:8px;font-size:11px;color:#fff;}
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <div class="logo-container"><img src="logo.png" alt="לוגו עו''ד ערן דמרי"></div>
            <button id="installAppBtn" class="install-btn">התקן אפליקציה לנייד</button>
            <div id="iosPrompt" class="ios-prompt">להתקנה באייפון: לחץ שיתוף ואז 'הוסף למסך הבית'</div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('tab-offense', this)">עבירות חנ"א</button>
            <button class="tab-btn" onclick="switchTab('tab-warning', this)">בדיקת אזהרה</button>
            <button class="tab-btn" onclick="switchTab('tab-disabled', this)">תו נכה</button>
            <button class="tab-btn" onclick="switchTab('tab-experts', this)">טלפונים</button>
        </div>

        <div id="tab-offense" class="tab-content active">
            <div class="search-input-group">
                <input type="text" id="searchInput" placeholder="חפש עבירה, סעיף או מילה...">
                <button class="search-btn" onclick="performOffenseSearch()">חפש</button>
            </div>
            <div id="offenseResults" class="results-container"></div>
        </div>

        <div id="tab-warning" class="tab-content">
            <div class="search-input-group">
                <input type="text" id="warningCodeInput" placeholder="הקלד סמל סעיף לבדיקה...">
            </div>
            <div id="warningForm" style="background: #222; padding: 15px; border-radius: 10px;">
                <label class="check-container">7 שנות ותק נהיגה לפחות? <input type="checkbox" id="q_seniority"></label>
                <label class="check-container">נקי ב-5 השנים האחרונות? <input type="checkbox" id="q_clean_history"></label>
                <label class="check-container">הנהג מודה בעובדות? <input type="checkbox" id="q_admission"></label>
                <label class="check-container">הנהג אזרח ישראלי? <input type="checkbox" id="q_citizen" checked></label>
                <button class="search-btn" style="width:100%; height:45px; margin-top:10px; border-radius:8px;" onclick="calculateWarning()">בדוק זכאות ושלח לתיעוד</button>
            </div>
            <div id="warningResult" style="margin-top:20px;"></div>
        </div>

        <div id="tab-disabled" class="tab-content">
            <div class="search-input-group">
                <input type="text" id="carNumberInput" placeholder="מספר רכב לבדיקה">
                <button class="search-btn" onclick="performDisabledCheck()">בדוק</button>
            </div>
            <div id="disabledResults" class="results-container"></div>
        </div>

        <div id="tab-experts" class="tab-content">
            <input type="search" id="expertSearchInput" placeholder="חיפוש מומחה או תפקיד..." style="background:#2a2a2a; width:100%; border-radius:8px; border:1px solid #444; margin-bottom:10px; color:#fff; padding:12px;">
            <div id="loadingExperts" style="text-align:center;">טוען נתונים...</div>
            <div id="expertResultsContainer" class="results-container"></div>
        </div>

        <div class="footer-note">המידע מבוסס על חנ"א מרץ 2026. אין האתר אחראי למידע.</div>
    </div>

    <script>
        const GOOGLE_SHEET_API_URL = "https://script.google.com/macros/s/AKfycbzHh9oWMPATuev4sAvEWzvSMXsPZZacISGz33GNrlJ_OZtTISSLHYGxSy4YMhJ6G39_/exec"; 

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js'); });
        }

        // ניהול טאבים
        function switchTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active');
        }

        // נתוני חנ"א
        const hanaFines = { "2555": "250", "2562": "750", "3511": "500", "5118": "500", "5440": "500", "5441": "750", "6245": "500", "6528": "1500", "6536": "750", "6541": "250", "6542": "750", "6554": "750", "6556": "250", "6557": "750", "6560": "750", "6563": "750", "6566": "750", "6579": "750", "6650": "750", "6653": "750", "6656": "750", "6701": "1500", "7074": "1500", "7081": "1500", "7140": "1000", "7141": "1000", "7148": "1000", "7149": "1000", "7280": "1000", "7287": "500", "7316": "750", "7317": "750", "7318": "750", "7319": "750", "7320": "500", "7321": "500", "7322": "500", "7364": "500", "7366": "750" };
        const hanaSummons = ["0913","2000","2005","2023","2106","2107","2108","2487","2488","2489","2494","2556","2557","3015","3016","3208","3477","4077","4465","4609","5901","6153","6188","6189","6190","6191","6192","6243","6251","6254","6279","6327","6371","6401","6405","6406","6453","6458","6467","6468","6484","6488","6489","6490","6491","6575","6587","6602","6603","6618","6623","6627","6629","6630","6631","6632","6660","6676","6684","6685","6687","6719","6739","6741","6742","6744","6745","6846","6847","7021","7022","7023","7027","7028","7029","7030","7031","7033","7034","7035","7036","7037","7038","7045","7068","7070","7071","7073","7075","7078","7080","7082","7084","7086","7088","7090","7092","7094","7096","7102","7103","7104","7105","7106","7109","7113","7114","7122","7126","7127","7130","7131","7132","7133","7137","7138","7139","7155","7160","7161","7166","7168","7171","7172","7173","7177","7178","7179","7180","7181","7182","7183","7184","7185","7186","7187","7188","7189","7190","7191","7193","7196","7206","7243","7264","7270","7271","7281","7282","7283","7297","7298","7300","7350","7356","7357","7358","7359","7363"];
        const NO_WARNING_CODES = ["7140", "7257", "7141", "6528", "7255", "6701", "7159", "5441", "7256", "6680", "6201", "6105", "6106", "3827", "6055", "5920", "7324", "7339", "7346", "5663", "2555", "2562", "5439", "6103", "6104", "6199", "6249", "6250", "7203", "3847", "3848", "3849", "3850", "5637", "5641", "5664", "5668", "6180", "6267", "6420", "7154", "7170", "3511", "7258", "5512", "7259", "5952"];

        // לוגיקת מחשבון אזהרה
        async function calculateWarning() {
            const semel = document.getElementById('warningCodeInput').value.trim();
            const seniority = document.getElementById('q_seniority').checked;
            const clean = document.getElementById('q_clean_history').checked;
            const admit = document.getElementById('q_admission').checked;
            const citizen = document.getElementById('q_citizen').checked;
            const res = document.getElementById('warningResult');

            if (!semel) { res.innerHTML = "נא להזין סמל סעיף"; return; }

            const fine = parseInt(hanaFines[semel] || 0);
            const isSummons = hanaSummons.includes(semel);
            const isForbidden = NO_WARNING_CODES.includes(semel);

            let errors = [];
            if (isSummons) errors.push("הזמנה לדין");
            if (fine >= 1500) errors.push("קנס 1,500 ש''ח ומעלה");
            if (isForbidden) errors.push("סעיף מוחרג בחנ''א");
            if (!seniority) errors.push("פחות מ-7 שנות ותק");
            if (!clean) errors.push("עבר לא נקי ב-5 שנים אחרונות");
            if (!admit) errors.push("הנהג לא מודה");
            if (!citizen) errors.push("אינו אזרח ישראלי");

            const success = errors.length === 0;
            if (success) {
                res.innerHTML = '<div style="background:var(--success); color:#000; padding:15px; border-radius:8px; font-weight:bold; text-align:center;">✅ זכאי עקרונית להמרת אזהרה</div>';
            } else {
                res.innerHTML = '<div style="background:var(--danger); color:#fff; padding:15px; border-radius:8px;">❌ לא זכאי: <ul style="margin:5px 0;">' + errors.map(e => `<li>${e}</li>`).join('') + '</ul></div>';
            }

            // שמירה ל-Google Sheets
            const payload = { semel, eligible: success, reasons: errors, timestamp: new Date().toLocaleString() };
            try {
                fetch(GOOGLE_SHEET_API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            } catch (e) { console.error("Sync failed"); }
        }

        // חיפושים (חנ"א, תו נכה, מומחים) - הקוד הקיים שלך בגרסה מקוצרת ויציבה
        let apiRecords = [];
        async function loadOffenses() { 
            try { const r = await fetch('https://data.gov.il/api/3/action/datastore_search?resource_id=a2dd714b-e012-46e4-a996-6307f8b46fc5&limit=10000');
            const d = await r.json(); apiRecords = d.result.records; } catch(e){}
        }
        loadOffenses();

        function performOffenseSearch() {
            const q = document.getElementById('searchInput').value.trim();
            const res = document.getElementById('offenseResults');
            if(!q) return;
            let matches = apiRecords.filter(r => String(r['סמל עבירה']).includes(q) || String(r['תיאור עבירה']).includes(q)).slice(0, 10);
            res.innerHTML = matches.map(r => `
                <div class="offense-card">
                    <div class="contact-name">סמל: ${r['סמל עבירה']}</div>
                    <div class="badge">${hanaSummons.includes(String(r['סמל עבירה'])) ? '🚨 הזמנה לדין' : '₪' + (hanaFines[r['סמל עבירה']] || '0')}</div>
                    <div class="value">${r['תיאור עבירה']}</div>
                </div>
            `).join('');
        }

        // לוגיקת מומחים
        let contactsData = [];
        async function fetchContacts() {
            try { const r = await fetch(GOOGLE_SHEET_API_URL); contactsData = await r.json(); 
            document.getElementById('loadingExperts').style.display='none'; renderContacts(contactsData); } catch(e){}
        }
        function renderContacts(data) {
            const container = document.getElementById('expertResultsContainer');
            container.innerHTML = data.map(c => {
                const isEmail = String(c.phone).includes('@');
                return `
                <div class="offense-card expert-card" style="display:flex;">
                    <div class="contact-name">${c.name}</div>
                    <div class="value">${c.phone}</div>
                    <div class="actions">
                        ${isEmail ? `<a href="mailto:${c.phone}" class="action-btn" style="background:#3498db;">📩 מייל</a>` : 
                        `<a href="tel:${c.phone}" class="action-btn btn-call">📞 חיוג</a>
                         <a href="https://wa.me/972${String(c.phone).substring(1)}" class="action-btn btn-wa">💬 WA</a>`}
                    </div>
                </div>`;
            }).join('');
        }
        document.getElementById('expertSearchInput').addEventListener('input', (e) => {
            const q = e.target.value.toLowerCase();
            renderContacts(contactsData.filter(c => c.name.toLowerCase().includes(q)));
        });

        // תו נכה
        function performDisabledCheck() {
            const n = document.getElementById('carNumberInput').value.replace(/\D/g,'');
            const res = document.getElementById('disabledResults');
            fetch(`https://data.gov.il/api/3/action/datastore_search?resource_id=c8b9f9c8-4612-4068-934f-d4acd2e3c06e&q=${n}`)
            .then(r => r.json()).then(d => {
                if(d.result.records.length > 0) res.innerHTML = '<div class="badge" style="background:var(--success); color:#000; width:100%; padding:20px; font-size:18px;">✅ תו נכה פעיל</div>';
                else res.innerHTML = '<div class="badge" style="background:var(--danger); color:#fff; width:100%; padding:20px;">❌ אין תו נכה</div>';
            });
        }

        fetchContacts();
    </script>
</body>
</html>

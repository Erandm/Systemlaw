<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>מערכת עזר משפטית | עו"ד ערן דמרי</title>
    
    <meta name="description" content="מערכת עזר מקצועית לעורכי דין תעבורה: חנ''א, תו נכה ומחשבון אזהרה.">
    <meta name="google-site-verification" content="b95FeajTUe8qQAx7oqYCWQlgBDopgw_KA48q6j96CkE" />
    
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f2cb05">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="logo.png">

    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {--primary:#f2cb05; --bg:#121212; --card:#1e1e1e; --text:#fff; --border:#333; --success:#2ecc71; --danger:#ff4d4d; --info:#3498db; --wa:#25D366;}
        *{box-sizing:border-box; font-family:'Heebo', sans-serif;}
        body{background:var(--bg); color:var(--text); margin:0; padding:0; display:flex; justify-content:center; min-height:100vh;}
        .app-container{width:100%; max-width:500px; padding:20px; position:relative; padding-bottom:120px;}
        .header{text-align:center; margin-bottom:20px;}
        .header img{max-width:80%; height:auto; filter:drop-shadow(0 2px 4px rgba(0,0,0,0.5));}
        
        .tabs{display:flex; gap:5px; margin-bottom:20px;}
        .tab-btn{flex:1; padding:12px 5px; font-size:13px; font-weight:bold; background:#2a2a2a; color:#fff; border:1px solid #444; border-radius:8px; cursor:pointer;}
        .tab-btn.active{background:var(--primary); color:#000; border-color:var(--primary);}
        
        .tab-content{display:none;}
        .tab-content.active{display:block;}

        .search-group{display:flex; background:#2a2a2a; border-radius:8px; border:1px solid #444; margin-bottom:15px; overflow:hidden;}
        input{flex:1; padding:15px; font-size:16px; border:none; background:transparent; color:#fff; outline:none;}
        .search-btn{background:var(--primary); color:#000; border:none; padding:0 15px; font-weight:bold; cursor:pointer;}

        .card{background:var(--card); border-radius:8px; padding:15px; border-right:4px solid var(--primary); border:1px solid var(--border); margin-bottom:15px;}
        .badge{font-size:12px; font-weight:bold; padding:4px 8px; border-radius:4px; background:#333; color:#aaa; margin-left:5px;}
        
        /* מחשבון אזהרה */
        .check-item {display:flex; align-items:center; justify-content:space-between; padding:12px; background:#262626; border-radius:8px; margin-bottom:8px; border:1px solid #333;}
        .check-item input{width:22px; height:22px; accent-color:var(--primary);}

        .actions{display:flex; gap:8px; margin-top:10px;}
        .act-btn{flex:1; display:flex; align-items:center; justify-content:center; gap:5px; padding:10px; border-radius:50px; color:#fff; text-decoration:none; font-weight:bold; font-size:14px;}

        .footer{position:absolute; bottom:15px; left:15px; right:15px; text-align:center; font-size:11px; opacity:0.7;}
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <img src="logo.png" alt="עו''ד ערן דמרי" onerror="this.style.display='none'">
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('tab-offense', this)">חנ"א</button>
            <button class="tab-btn" onclick="switchTab('tab-warning', this)">אזהרה</button>
            <button class="tab-btn" onclick="switchTab('tab-disabled', this)">תו נכה</button>
            <button class="tab-btn" onclick="switchTab('tab-experts', this)">טלפונים</button>
        </div>

        <div id="tab-offense" class="tab-content active">
            <div class="search-group">
                <input type="text" id="offenseInput" placeholder="סמל סעיף או מילת חיפוש...">
                <button class="search-btn" onclick="searchOffense()">חפש</button>
            </div>
            <div id="offenseResults"></div>
        </div>

        <div id="tab-warning" class="tab-content">
            <input type="text" id="warnSemel" placeholder="סמל סעיף לבדיקה..." style="width:100%; background:#2a2a2a; border:1px solid #444; color:#fff; padding:15px; border-radius:8px; margin-bottom:15px;">
            <div class="check-item">7 שנות ותק נהיגה? <input type="checkbox" id="w1"></div>
            <div class="check-item">נקי ב-5 שנים אחרונות? <input type="checkbox" id="w2"></div>
            <div class="check-item">הנהג מודה בעובדות? <input type="checkbox" id="w3"></div>
            <div class="check-item">הנהג אזרח ישראלי? <input type="checkbox" id="w4" checked></div>
            <div class="check-item">האם הרכב חונה (הדבקה)? <input type="checkbox" id="w5"></div>
            <div class="check-item">תחבורה קלה: עבר הכשרה? <input type="checkbox" id="w6" checked></div>
            <button class="search-btn" style="width:100%; height:50px; border-radius:8px; margin-top:10px;" onclick="checkWarning()">בדוק זכאות</button>
            <div id="warnRes" style="margin-top:20px;"></div>
        </div>

        <div id="tab-disabled" class="tab-content">
            <div class="search-group">
                <input type="text" id="carInput" placeholder="מספר רכב">
                <button class="search-btn" onclick="checkDisabled()">בדוק</button>
            </div>
            <div id="disabledRes"></div>
        </div>

        <div id="tab-experts" class="tab-content">
            <input type="text" id="expSearch" placeholder="חיפוש במאגר..." style="width:100%; background:#2a2a2a; border:1px solid #444; color:#fff; padding:15px; border-radius:8px; margin-bottom:15px;">
            <div id="expList">טוען נתונים...</div>
        </div>

        <div class="footer">מערכת עזר משפטית | חנ"א מרץ 2026</div>
    </div>

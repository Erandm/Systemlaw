<div id="tab-warning" class="tab-content">
    <div class="search-input-group" style="margin-bottom: 10px;">
        <input type="text" id="warningCodeInput" placeholder="הקלד סמל סעיף לבדיקה (למשל 6528)">
    </div>
    
    <div id="warningForm" style="background: #222; padding: 15px; border-radius: 10px; border: 1px solid #444;">
        <p style="color: var(--primary); font-weight: bold; margin-bottom: 15px; border-bottom: 1px dotted #555; padding-bottom: 5px;">תנאי סף לנהג ולעבירה:</p>
        
        <label class="check-container">7 שנות ותק נהיגה לפחות? <input type="checkbox" id="q_seniority"></label>
        <label class="check-container">נקי ב-5 השנים האחרונות? <input type="checkbox" id="q_clean_history"></label>
        <label class="check-container">הנהג מודה בביצוע העבירה? <input type="checkbox" id="q_admission"></label>
        <label class="check-container">הנהג אזרח ישראלי? <input type="checkbox" id="q_citizen" checked></label>
        
        <p style="color: var(--primary); font-weight: bold; margin: 15px 0 10px 0; border-bottom: 1px dotted #555; padding-bottom: 5px;">סייגים מיוחדים:</p>
        <label class="check-container">האם הדו"ח נרשם ב"הדבקה" (רכב חונה)? <input type="checkbox" id="q_parked"></label>
        <label class="check-container">ברכב לתחבורה קלה: האם עבר הכשרה? <input type="checkbox" id="q_trained" checked></label>

        <button class="search-btn" style="width:100%; height:50px; margin-top:15px; border-radius:8px; font-size: 16px;" onclick="calculateWarning()">בדוק זכאות ושלח לתיעוד</button>
    </div>
    <div id="warningResult" style="margin-top:20px;"></div>
</div>

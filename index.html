<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>מערכת עורכי דין - ערן דמרי</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;800&family=Assistant:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {--primary:#f2cb05;--primary-hover:#d1b004;--danger:#ff4d4d;--success:#2ecc71;--info:#3498db;--bg-color:#121212;--card-bg:#1e1e1e;--text-main:#ffffff;--text-muted:#a0a0a0;--border:#333333; --secondary-blue: #3b82f6; --call-green: #10b981; --wa-green: #25D366;}
        html, body { max-width: 100%; overflow-x: hidden; margin: 0; padding: 0; background-color: var(--bg-color); }
        *{box-sizing:border-box;font-family:'Heebo',sans-serif;}
        body{color:var(--text-main);display:flex;justify-content:center;min-height:100vh;}
        .app-container{width:100%;max-width:500px;padding:20px;display:flex;flex-direction:column;position:relative;padding-bottom:140px;}
        .header{text-align:center;margin-bottom:20px;}
        .logo-container img{max-width:90%;height:auto;opacity:0.9;}
        .tabs{display:flex;justify-content:center;gap:8px;margin-bottom:25px;}
        .tab-btn{flex:1;padding:12px 5px;font-size:14px;font-weight:bold;background:#2a2a2a;color:#fff;border:1px solid #444;border-radius:8px;cursor:pointer;transition:0.3s;}
        .tab-btn.active{background:var(--primary);color:#000;border-color:var(--primary);}
        .tab-content{display:none;}
        .tab-content.active{display:block;}
        .search-input-group{display:flex;background:#2a2a2a;border-radius:8px;border:1px solid #444;margin-bottom:15px;position:relative;}
        input[type="text"], input[type="search"]{flex-grow:1;padding:16px 20px;font-size:16px;border:none;background:transparent;color:#fff;outline:none;}
        .search-btn{background-color:var(--primary);color:#000;border:none;padding:0 25px;font-size:16px;font-weight:bold;cursor:pointer;border-radius:8px 0 0 8px;}
        .autocomplete-list{position:absolute;top:100%;left:0;right:0;background:var(--card-bg);border:1px solid var(--border);border-radius:8px;max-height:250px;overflow-y:auto;display:none;z-index:100;}
        .autocomplete-item{padding:12px 15px;cursor:pointer;border-bottom:1px solid var(--border);display:flex;flex-direction:column;}
        .autocomplete-item:hover{background-color:#333;}
        .results-container{margin-top:20px; display: flex; flex-direction: column; gap: 15px;}
        .offense-card{background:var(--card-bg);border-radius:8px;padding:20px;border-right:4px solid var(--primary);border:1px solid var(--border);}
        .badge{font-size:13px;font-weight:bold;padding:5px 10px;border-radius:4px;background:#2a2a2a;color:var(--text-muted); display:inline-block; margin: 2px;}
        .badge.fine{background:rgba(46,204,113,0.15);color:#2ecc71;}
        .expert-card { border-right: 4px solid var(--secondary-blue); display: none; flex-direction: column; }
        .contact-name { font-weight: 800; font-size: 1.2rem; color: var(--primary); margin-bottom: 5px; }
        .actions { display: flex; gap: 10px; margin-top: 10px; }
        .action-btn { flex: 1; text-align: center; padding: 10px; border-radius: 50px; color: white; text-decoration: none; font-weight: 700; font-size: 0.9rem; }
        .btn-call { background: var(--call-green); }
        .btn-wa { background: var(--wa-green); }
        .footer-note{text-align:center;background:#1a1a1a;padding:15px;border-radius:8px;border-top:2px solid var(--primary);font-size:12px;color:#ffffff;margin-top:40px;}
        .highlight{color:var(--primary); font-weight: bold;}
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <div class="logo-container"><img src="logo.png" alt="לוגו" onerror="this.src='https://via.placeholder.com/400x100/121212/f2cb05?text=Eran+Damari';"></div>
            <p style="color:var(--primary); font-weight:bold; font-size:18px;">מערכת עזר משפטית</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('tab-offense', this)">עבירות חנ"א</button>
            <button class="tab-btn" onclick="switchTab('tab-disabled', this)">בדיקת תו נכה</button>
            <button class="tab-btn" onclick="switchTab('tab-experts', this)">מאגר טלפונים</button>
        </div>

        <div id="tab-offense" class="tab-content active">
            <div class="search-input-group">
                <input type="text" id="searchInput" placeholder="הקלד עבירה או סמל סעיף" autocomplete="off">
                <button class="search-btn" onclick="performOffenseSearch()">חפש</button>
                <div id="autocompleteList" class="autocomplete-list"></div>
            </div>
            <div id="offenseResults" class="results-container"></div>
        </div>

        <div id="tab-disabled" class="tab-content">
            <div class="search-input-group">
                <input type="text" id="carNumberInput" placeholder="מספר רכב" autocomplete="off">
                <button class="search-btn" onclick="performDisabledCheck()">בדוק</button>
            </div>
            <div id="disabledResults" class="results-container"></div>
        </div>

        <div id="tab-experts" class="tab-content">
            <div class="search-input-group">
                <input type="search" id="expertSearchInput" placeholder="חיפוש שם או תפקיד..." autocomplete="off">
            </div>
            <div id="expertResultsContainer" class="results-container"></div>
        </div>

        <div class="footer-note">
            <strong>שימו לב!</strong> המידע מתקבל ממאגרים ממשלתיים.<br>
            אין האתר אחראי למידע המוצג.
        </div>
    </div>

    <script>
        function switchTab(tabId, btnElement) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btnElement.classList.add('active');
        }

        const offenseResourceId = 'a2dd714b-e012-46e4-a996-6307f8b46fc5';
        let apiRecords = [];

        async function loadOffenses() {
            try {
                const response = await fetch(`https://data.gov.il/api/3/action/datastore_search?resource_id=${offenseResourceId}&limit=10000`);
                const data = await response.json();
                apiRecords = data.result.records;
            } catch (e) { console.error('Error loading data'); }
        }
        loadOffenses();

        // השלמה אוטומטית
        document.getElementById('searchInput').addEventListener('input', function() {
            const val = this.value.trim();
            const list = document.getElementById('autocompleteList');
            list.innerHTML = '';
            if (val.length < 2) { list.style.display = 'none'; return; }
            
            const matches = apiRecords.filter(r => 
                String(r['סמל עבירה']).includes(val) || String(r['תיאור עבירה']).includes(val)
            ).slice(0, 8);

            if (matches.length > 0) {
                list.style.display = 'block';
                matches.forEach(m => {
                    const item = document.createElement('div');
                    item.className = 'autocomplete-item';
                    item.innerHTML = `<strong>${m['סמל עבירה']}</strong> - ${m['תיאור עבירה'].substring(0, 40)}...`;
                    item.onclick = () => {
                        document.getElementById('searchInput').value = m['סמל עבירה'];
                        list.style.display = 'none';
                        performOffenseSearch();
                    };
                    list.appendChild(item);
                });
            } else { list.style.display = 'none'; }
        });

        async function performOffenseSearch() {
            const val = document.getElementById('searchInput').value.trim();
            const resBox = document.getElementById('offenseResults');
            if (!val) return;
            resBox.innerHTML = 'מחפש...';
            
            const results = apiRecords.filter(r => 
                String(r['סמל עבירה']) === val || String(r['תיאור עבירה']).includes(val)
            ).slice(0, 10);

            if (results.length === 0) { resBox.innerHTML = 'לא נמצאו תוצאות'; return; }

            let html = '';
            results.forEach(r => {
                html += `<div class="offense-card">
                    <div style="color:var(--primary); font-weight:bold;">סמל: ${r['סמל עבירה']}</div>
                    <div style="margin: 10px 0;">${r['תיאור עבירה']}</div>
                    <span class="badge">🎯 ${r['ניקוד'] || 0} נק'</span>
                    <span class="badge fine">💰 ${r['קנס'] || 'הזמנה לדין'}</span>
                </div>`;
            });
            resBox.innerHTML = html;
        }

        function performDisabledCheck() {
            const num = document.getElementById('carNumberInput').value.replace(/\D/g, '');
            const resBox = document.getElementById('disabledResults');
            if (!num) return;
            resBox.innerHTML = 'בודק במאגר...';
            
            fetch(`https://data.gov.il/api/3/action/datastore_search?resource_id=c8b9f9c8-4612-4068-934f-d4acd2e3c06e&q=${num}`)
                .then(r => r.json())
                .then(data => {
                    const found = data.result.records.some(r => String(r['MISPAR_RECHEV']) === num || Object.values(r).includes(num));
                    if (found) {
                        resBox.innerHTML = '<div class="offense-card" style="border-color:#2ecc71; text-align:center; background:#1a251f;">✅ נמצא תו נכה פעיל</div>';
                    } else {
                        resBox.innerHTML = '<div class="offense-card" style="border-color:#ff4d4d; text-align:center;">❌ לא נמצא תו נכה פעיל</div>';
                    }
                }).catch(() => resBox.innerHTML = 'שגיאה בחיבור למאגר');
        }
